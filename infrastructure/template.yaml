AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Relay — Serverless event orchestration platform

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 30
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        EVENTS_TABLE: !Ref EventsTable
        EXECUTIONS_TABLE: !Ref ExecutionsTable
        WORKFLOWS_TABLE: !Ref WorkflowsTable
        PROJECTS_TABLE: !Ref ProjectsTable
        AUDIT_TABLE: !Ref AuditTable
        MAIN_QUEUE_URL: !Ref MainQueue
        DLQ_URL: !Ref DeadLetterQueue
        PAYLOAD_BUCKET: !Ref PayloadBucket
        ARTIFACTS_BUCKET: !Ref ArtifactsBucket
        SNAPSHOTS_BUCKET: !Ref SnapshotsBucket

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

Resources:

  # ── API Gateway ──────────────────────────────────────────────────────────────

  RelayApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: relay-api
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,x-relay-api-key,x-relay-project-id'"
        AllowOrigin: "'*'"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 1000
          ThrottlingRateLimit: 500

  # ── Lambda: Ingest ───────────────────────────────────────────────────────────

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: relay-ingest
      Handler: src/handlers/ingest.handler
      CodeUri: ../packages/relay-api/
      Description: Validates incoming events, writes to DynamoDB, publishes to SQS
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProjectsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt MainQueue.QueueName
        - S3WritePolicy:
            BucketName: !Ref PayloadBucket
      Events:
        PostEvents:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /events
            Method: POST
        PostBatch:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /events/batch
            Method: POST
        PostWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /webhooks/{project_id}/{source}
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/ingest.ts
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'
          - '@aws-sdk/client-sqs'
          - '@aws-sdk/client-s3'

  IngestLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${IngestFunction}
      RetentionInDays: 30

  # ── Lambda: Worker ───────────────────────────────────────────────────────────

  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: relay-worker
      Handler: src/handlers/worker.handler
      CodeUri: ../packages/relay-api/
      Timeout: 60
      Description: Consumes SQS messages and executes workflow handlers
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - S3CrudPolicy:
            BucketName: !Ref PayloadBucket
        - S3WritePolicy:
            BucketName: !Ref ArtifactsBucket
        - Statement:
            - Effect: Allow
              Action: sqs:ChangeMessageVisibility
              Resource: !GetAtt MainQueue.Arn
      Events:
        MainQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt MainQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/worker.ts
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'
          - '@aws-sdk/client-sqs'
          - '@aws-sdk/client-s3'

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${WorkerFunction}
      RetentionInDays: 30

  # ── Lambda: DLQ Handler ──────────────────────────────────────────────────────

  DlqHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: relay-dlq-handler
      Handler: src/handlers/dlq-handler.handler
      CodeUri: ../packages/relay-api/
      Description: Processes dead-lettered events and writes S3 failure snapshots
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ExecutionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditTable
        - S3WritePolicy:
            BucketName: !Ref SnapshotsBucket
      Events:
        DLQEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt DeadLetterQueue.Arn
            BatchSize: 1
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/dlq-handler.ts
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'
          - '@aws-sdk/client-sqs'
          - '@aws-sdk/client-s3'

  DlqHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${DlqHandlerFunction}
      RetentionInDays: 30

  # ── Lambda: Scheduler ────────────────────────────────────────────────────────

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: relay-scheduler
      Handler: src/handlers/scheduler.handler
      CodeUri: ../packages/relay-api/
      Description: Triggers scheduled workflow events via EventBridge
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt MainQueue.QueueName
      # EventBridge schedule rule added in Phase 3
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/scheduler.ts
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'
          - '@aws-sdk/client-sqs'
          - '@aws-sdk/client-s3'

  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${SchedulerFunction}
      RetentionInDays: 30

  # ── Lambda: API Read ─────────────────────────────────────────────────────────

  ApiReadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: relay-api-read
      Handler: src/handlers/api-read.handler
      CodeUri: ../packages/relay-api/
      Description: Serves dashboard and project read API
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ExecutionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref WorkflowsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProjectsTable
        - S3ReadPolicy:
            BucketName: !Ref PayloadBucket
      Events:
        GetEvents:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /events
            Method: GET
        GetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /events/{event_id}
            Method: GET
        DashboardOverview:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /dashboard/overview
            Method: GET
        DashboardEvents:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /dashboard/events
            Method: GET
        DashboardExecutions:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /dashboard/executions/{execution_id}
            Method: GET
        DashboardProjects:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /dashboard/projects
            Method: GET
        DashboardDlq:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /dashboard/dlq
            Method: GET
        RequeueDlq:
          Type: Api
          Properties:
            RestApiId: !Ref RelayApi
            Path: /dashboard/dlq/{event_id}/requeue
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/api-read.ts
        External:
          - '@aws-sdk/client-dynamodb'
          - '@aws-sdk/lib-dynamodb'
          - '@aws-sdk/client-sqs'
          - '@aws-sdk/client-s3'

  ApiReadLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiReadFunction}
      RetentionInDays: 30

  # ── SQS Queues ───────────────────────────────────────────────────────────────

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: relay-dlq
      MessageRetentionPeriod: 1209600

  MainQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: relay-main-queue
      VisibilityTimeout: 90
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  # ── DynamoDB Tables ──────────────────────────────────────────────────────────

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: relay-events
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: event_id, AttributeType: S }
        - { AttributeName: project_id, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: event_type, AttributeType: S }
        - { AttributeName: created_at, AttributeType: S }
        - { AttributeName: updated_at, AttributeType: S }
      KeySchema:
        - { AttributeName: event_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: project-created-index
          KeySchema:
            - { AttributeName: project_id, KeyType: HASH }
            - { AttributeName: created_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: status-updated-index
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: updated_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: type-created-index
          KeySchema:
            - { AttributeName: event_type, KeyType: HASH }
            - { AttributeName: created_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ExecutionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: relay-executions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: event_id, AttributeType: S }
        - { AttributeName: attempt, AttributeType: N }
        - { AttributeName: execution_id, AttributeType: S }
        - { AttributeName: project_id, AttributeType: S }
        - { AttributeName: status, AttributeType: S }
        - { AttributeName: started_at, AttributeType: S }
      KeySchema:
        - { AttributeName: event_id, KeyType: HASH }
        - { AttributeName: attempt, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: project-status-index
          KeySchema:
            - { AttributeName: project_id, KeyType: HASH }
            - { AttributeName: started_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: status-started-index
          KeySchema:
            - { AttributeName: status, KeyType: HASH }
            - { AttributeName: started_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: execution-id-index
          KeySchema:
            - { AttributeName: execution_id, KeyType: HASH }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  WorkflowsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: relay-workflows
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: project_id, AttributeType: S }
        - { AttributeName: event_type, AttributeType: S }
      KeySchema:
        - { AttributeName: project_id, KeyType: HASH }
        - { AttributeName: event_type, KeyType: RANGE }

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: relay-projects
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: project_id, AttributeType: S }
      KeySchema:
        - { AttributeName: project_id, KeyType: HASH }

  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: relay-audit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: project_id, AttributeType: S }
        - { AttributeName: sort_key, AttributeType: S }
      KeySchema:
        - { AttributeName: project_id, KeyType: HASH }
        - { AttributeName: sort_key, KeyType: RANGE }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── S3 Buckets ───────────────────────────────────────────────────────────────

  PayloadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub relay-payloads-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-payloads
            Status: Enabled
            ExpirationInDays: 30

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub relay-artifacts-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-artifacts
            Status: Enabled
            ExpirationInDays: 90

  SnapshotsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub relay-snapshots-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-snapshots
            Status: Enabled
            ExpirationInDays: 14

# ── Outputs ────────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RelayApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: relay-api-url
  MainQueueUrl:
    Description: Main SQS queue URL
    Value: !Ref MainQueue
    Export:
      Name: relay-main-queue-url
  DlqUrl:
    Description: Dead-letter queue URL
    Value: !Ref DeadLetterQueue
    Export:
      Name: relay-dlq-url
  EventsTableName:
    Description: relay-events DynamoDB table name
    Value: !Ref EventsTable
  ExecutionsTableName:
    Description: relay-executions DynamoDB table name
    Value: !Ref ExecutionsTable
  WorkflowsTableName:
    Description: relay-workflows DynamoDB table name
    Value: !Ref WorkflowsTable
  ProjectsTableName:
    Description: relay-projects DynamoDB table name
    Value: !Ref ProjectsTable
  AuditTableName:
    Description: relay-audit DynamoDB table name
    Value: !Ref AuditTable
  PayloadBucketName:
    Description: S3 bucket for event payloads
    Value: !Ref PayloadBucket
  ArtifactsBucketName:
    Description: S3 bucket for execution artifacts
    Value: !Ref ArtifactsBucket
  SnapshotsBucketName:
    Description: S3 bucket for DLQ failure snapshots
    Value: !Ref SnapshotsBucket
